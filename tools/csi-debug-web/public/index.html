<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CSI 调试工作台</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0f1115;
      --panel: #171b21;
      --panel-2: #202630;
      --panel-3: #11151b;
      --line: #364150;
      --line-soft: rgba(255, 255, 255, 0.1);
      --text: #edf1f4;
      --muted: #98a6b3;
      --muted-2: #73808c;
      --accent: #43d6ad;
      --accent-2: #f1c75b;
      --accent-3: #7cb7ff;
      --danger: #ff6f73;
      --ok: #78df8e;
      --warn: #ffca6e;
      --shadow: rgba(0, 0, 0, 0.28);
      font-family: ui-monospace, "SFMono-Regular", Menlo, Consolas, monospace;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-width: 320px;
      background:
        linear-gradient(90deg, rgba(255,255,255,0.034) 1px, transparent 1px) 0 0 / 30px 30px,
        linear-gradient(0deg, rgba(255,255,255,0.024) 1px, transparent 1px) 0 0 / 30px 30px,
        radial-gradient(circle at 8% 0%, rgba(67, 214, 173, 0.12), transparent 30%),
        radial-gradient(circle at 88% 12%, rgba(241, 199, 91, 0.1), transparent 28%),
        var(--bg);
      color: var(--text);
    }

    button, input, select, textarea {
      font: inherit;
    }

    button, .download-link {
      min-height: 38px;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 8px 12px;
      background: var(--panel-2);
      color: var(--text);
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    button:hover, .download-link:hover {
      border-color: var(--accent);
    }

    button.primary {
      background: var(--accent);
      border-color: var(--accent);
      color: #07110f;
      font-weight: 700;
    }

    button.danger {
      border-color: rgba(255, 111, 115, 0.55);
      color: #ffd6d7;
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.55;
    }

    input, select, textarea {
      min-width: 0;
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 9px 10px;
      background: #0b0e12;
      color: var(--text);
    }

    textarea {
      min-height: 108px;
      resize: vertical;
      line-height: 1.45;
    }

    label {
      display: grid;
      gap: 6px;
      color: var(--muted);
      font-size: 12px;
    }

    main {
      width: min(1560px, calc(100vw - 28px));
      margin: 0 auto;
      padding: 22px 0 34px;
    }

    .topbar {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      align-items: end;
      gap: 16px;
      padding-bottom: 18px;
      border-bottom: 1px solid var(--line);
    }

    h1 {
      margin: 0;
      font-size: clamp(24px, 3vw, 38px);
      letter-spacing: 0;
      line-height: 1.05;
    }

    .subtle {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }

    .status-stack {
      display: grid;
      gap: 8px;
      justify-items: end;
    }

    .status-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-width: 126px;
      justify-content: center;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 8px 12px;
      background: rgba(23, 27, 33, 0.96);
      box-shadow: 0 10px 30px var(--shadow);
      text-transform: uppercase;
      font-size: 12px;
      font-weight: 700;
    }

    .dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: var(--danger);
    }

    .status-pill.running .dot {
      background: var(--ok);
      box-shadow: 0 0 18px rgba(120, 223, 142, 0.65);
    }

    .status-pill.warn .dot {
      background: var(--warn);
      box-shadow: 0 0 16px rgba(255, 202, 110, 0.45);
    }

    .notice {
      display: none;
      margin-top: 14px;
      border: 1px solid rgba(255, 202, 110, 0.45);
      border-radius: 8px;
      padding: 10px 12px;
      color: #ffe6b5;
      background: rgba(83, 59, 20, 0.35);
      line-height: 1.45;
      overflow-wrap: anywhere;
    }

    .notice.visible {
      display: block;
    }

    .layout {
      display: grid;
      grid-template-columns: 340px minmax(0, 1fr);
      gap: 18px;
      margin-top: 18px;
    }

    .column {
      display: grid;
      gap: 18px;
      align-content: start;
    }

    .panel {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(23, 27, 33, 0.95);
      box-shadow: 0 18px 42px var(--shadow);
      overflow: hidden;
    }

    .panel h2 {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin: 0;
      padding: 12px 14px;
      border-bottom: 1px solid var(--line);
      background: #121720;
      font-size: 14px;
      letter-spacing: 0;
    }

    .panel-body {
      padding: 14px;
    }

    .form-grid {
      display: grid;
      gap: 10px;
    }

    .inline-grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 10px;
      align-items: end;
    }

    .action-row {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .action-row.three {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    .serial-hint {
      margin-top: 12px;
      border: 1px dashed var(--line);
      border-radius: 8px;
      padding: 10px;
      color: var(--muted);
      background: var(--panel-3);
      line-height: 1.45;
      overflow-wrap: anywhere;
    }

    .port-list, .device-list {
      display: grid;
      gap: 8px;
      margin-top: 12px;
    }

    .port-button, .device-button {
      width: 100%;
      text-align: left;
      justify-content: space-between;
      background: var(--panel-3);
    }

    .port-button {
      display: grid;
      justify-items: stretch;
      gap: 4px;
    }

    .port-button.active, .device-button.active {
      border-color: var(--accent);
      color: var(--accent);
    }

    .port-meta {
      color: var(--muted);
      font-size: 11px;
      overflow-wrap: anywhere;
    }

    .kv {
      display: grid;
      gap: 8px;
    }

    .kv-row {
      display: grid;
      grid-template-columns: minmax(116px, 0.48fr) minmax(0, 1fr);
      gap: 10px;
      align-items: start;
      border-bottom: 1px dashed var(--line-soft);
      padding-bottom: 8px;
    }

    .kv-row:last-child {
      border-bottom: 0;
      padding-bottom: 0;
    }

    .kv-key {
      color: var(--muted);
      font-size: 12px;
    }

    .kv-value {
      overflow-wrap: anywhere;
      line-height: 1.4;
    }

    .latest-grid {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 10px;
    }

    .metric {
      min-height: 76px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px;
      background: var(--panel-3);
    }

    .metric.strong {
      border-color: rgba(67, 214, 173, 0.48);
      background: linear-gradient(180deg, rgba(67, 214, 173, 0.12), rgba(17, 21, 27, 0.95));
    }

    .metric-label {
      color: var(--muted);
      font-size: 11px;
      overflow-wrap: anywhere;
    }

    .metric-value {
      margin-top: 8px;
      font-size: 18px;
      line-height: 1.2;
      overflow-wrap: anywhere;
    }

    .charts-header {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .charts-header select {
      width: 112px;
      padding: 6px 8px;
    }

    .charts {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
    }

    .chart-wrap {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #0b0e12;
      overflow: hidden;
      min-width: 0;
    }

    .chart-title {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      padding: 10px 12px;
      border-bottom: 1px solid var(--line);
      color: var(--muted);
      font-size: 12px;
    }

    canvas {
      display: block;
      width: 100%;
      height: 230px;
    }

    pre {
      min-height: 220px;
      max-height: 420px;
      margin: 0;
      overflow: auto;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      color: #dce3e7;
      background: #0b0e12;
      padding: 14px;
      border-radius: 8px;
      border: 1px solid var(--line);
      line-height: 1.45;
    }

    .empty-state {
      display: none;
      border: 1px dashed var(--line);
      border-radius: 8px;
      padding: 18px;
      color: var(--muted);
      text-align: center;
      background: var(--panel-3);
    }

    body.no-data .empty-state {
      display: block;
    }

    body.no-data .data-zone {
      opacity: 0.48;
    }

    .toast {
      position: fixed;
      right: 16px;
      bottom: 16px;
      z-index: 10;
      display: none;
      max-width: min(420px, calc(100vw - 32px));
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px 14px;
      background: #121720;
      color: var(--text);
      box-shadow: 0 18px 44px var(--shadow);
      line-height: 1.45;
      overflow-wrap: anywhere;
    }

    .toast.visible {
      display: block;
    }

    .toast.error {
      border-color: rgba(255, 111, 115, 0.65);
      color: #ffd7d8;
    }

    .toast.ok {
      border-color: rgba(120, 223, 142, 0.55);
      color: #dcffe3;
    }

    @media (max-width: 1120px) {
      .layout, .charts {
        grid-template-columns: 1fr;
      }

      .latest-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 620px) {
      main {
        width: min(100vw - 20px, 1560px);
        padding-top: 16px;
      }

      .topbar {
        grid-template-columns: 1fr;
      }

      .status-stack {
        justify-items: start;
      }

      .latest-grid, .action-row, .action-row.three, .inline-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body class="no-data">
  <main>
    <header class="topbar">
      <div>
        <h1>CSI 调试工作台</h1>
        <div class="subtle">本地串口 CSI 调试台；不连接 ESP-server，不写数据库，历史只保存在当前 Node 进程内存里。</div>
      </div>
      <div class="status-stack">
        <div id="runState" class="status-pill"><span class="dot"></span><span>未连接串口</span></div>
        <div id="sampleBadge" class="subtle">0 个样本</div>
      </div>
    </header>

    <div id="globalNotice" class="notice"></div>

    <div class="layout">
      <aside class="column">
        <section class="panel">
          <h2>串口连接区 <button type="button" id="refreshPorts">刷新端口</button></h2>
          <div class="panel-body">
            <form id="serialForm" class="form-grid">
              <label>串口路径
                <input id="serialPort" name="port" list="serialPortList" placeholder="/dev/cu.usbmodemxxx" autocomplete="off">
                <datalist id="serialPortList"></datalist>
              </label>
              <label>波特率
                <select id="serialBaud" name="baudRate">
                  <option value="115200">115200</option>
                  <option value="230400">230400</option>
                  <option value="460800">460800</option>
                  <option value="921600">921600</option>
                </select>
              </label>
              <div class="action-row">
                <button type="submit" id="connectSerial" class="primary">连接</button>
                <button type="button" id="stopSerial">断开</button>
              </div>
            </form>
            <div id="serialHint" class="serial-hint">正在读取串口状态...</div>
            <div id="serialPorts" class="port-list"></div>
          </div>
        </section>

        <section class="panel">
          <h2>连接状态</h2>
          <div class="panel-body kv" id="serialStatus"></div>
        </section>

        <section class="panel">
          <h2>设备</h2>
          <div class="panel-body">
            <label>当前设备 device_id
              <select id="deviceSelect"></select>
            </label>
            <div class="device-list" id="deviceList"></div>
          </div>
        </section>

        <section class="panel">
          <h2>数据操作区</h2>
          <div class="panel-body form-grid">
            <div class="action-row">
              <a class="download-link" href="/api/csi/export.json" download>导出 JSON</a>
              <a class="download-link" href="/api/csi/export.csv" download>导出 CSV</a>
            </div>
            <button type="button" id="clearHistory" class="danger">清空历史</button>
          </div>
        </section>
      </aside>

      <section class="column">
        <div class="empty-state">还没有 CSI 样本。可以点击“生成模拟样本”，或在手动调试区粘贴一行 csi summary 日志。</div>

        <section class="panel data-zone">
          <h2>最新状态区 <span id="latestStamp" class="subtle"></span></h2>
          <div class="panel-body">
            <div class="latest-grid" id="latestGrid"></div>
          </div>
        </section>

        <section class="panel data-zone">
          <h2>
            <span>曲线区 <span id="historyCount" class="subtle"></span></span>
            <span class="charts-header">
              <span class="subtle">样本数</span>
              <select id="historyLimit">
                <option value="200">200</option>
                <option value="500">500</option>
                <option value="1000" selected>1000</option>
                <option value="2000">2000</option>
                <option value="5000">5000</option>
              </select>
            </span>
          </h2>
          <div class="panel-body charts">
            <div class="chart-wrap">
              <div class="chart-title"><span>运动评分 motion_score</span><span id="motionRange"></span></div>
              <canvas id="motionCanvas" width="520" height="260"></canvas>
            </div>
            <div class="chart-wrap">
              <div class="chart-title"><span>信号强度 rssi</span><span id="rssiRange"></span></div>
              <canvas id="rssiCanvas" width="520" height="260"></canvas>
            </div>
            <div class="chart-wrap">
              <div class="chart-title"><span>幅度 / 方差</span><span id="amplitudeRange"></span></div>
              <canvas id="amplitudeCanvas" width="520" height="260"></canvas>
            </div>
          </div>
        </section>

        <section class="panel">
          <h2>手动调试区</h2>
          <div class="panel-body form-grid">
            <label>粘贴单行日志
              <textarea id="manualLine" spellcheck="false">I (12345) csi_service: csi summary {"schema":1,"device_id":"c5","room_id":"lab","state":"occupied","motion_score":0.72,"variance":0.44,"cv":0.08,"rssi":-35,"noise_floor":-90,"packet_count":64,"updated_at_ms":123456}</textarea>
            </label>
            <div class="action-row">
              <button type="button" id="parseLine" class="primary">解析这一行</button>
              <button type="button" id="mockSample">生成模拟样本</button>
            </div>
          </div>
        </section>

        <section class="panel data-zone">
          <h2>原始 JSON 区</h2>
          <div class="panel-body">
            <pre id="rawJson">{}</pre>
          </div>
        </section>
      </section>
    </div>
  </main>

  <div id="toast" class="toast"></div>

	<script>
	    var REFRESH_INTERVAL_DEFAULT_MS = 1000;
	    var REFRESH_INTERVAL_MIN_MS = 100;
	    var REFRESH_INTERVAL_MAX_MS = 5000;
	    var REFRESH_INTERVAL_HISTORY_SIZE = 12;
	    var HISTORY_LIMIT_DEFAULT = 1000;
	    var CHART_MAX_DISPLAY_POINTS = 520;
	    var SERIAL_STATUS_REFRESH_INTERVAL_MS = 1000;
	    var SERIAL_PORTS_REFRESH_INTERVAL_MS = 5000;

	    var state = {
	      latest: {},
	      devices: [],
	      selectedDevice: '',
	      history: [],
	      status: {},
	      ports: [],
	      historyLimit: HISTORY_LIMIT_DEFAULT,
	      refreshInFlight: false,
	      refreshTimer: 0,
	      refreshIntervalMs: REFRESH_INTERVAL_DEFAULT_MS,
	      statusRefreshInFlight: false,
	      statusRefreshTimer: 0,
	      portsRefreshInFlight: false,
	      portsRefreshTimer: 0,
	    };

    var latestFields = [
      ['received_at_iso', '样本时间', true],
      ['device_id', '设备 ID', true],
      ['room_id', '房间 ID', false],
      ['rssi', '信号强度 rssi', true],
      ['noise_floor', '噪声底 noise_floor', false],
      ['packet_count', '包数 packet_count', false],
      ['motion_score', '运动评分 motion_score', true],
      ['occupancy', '占用状态 occupancy', true],
      ['motion_state', '运动状态 motion', false],
      ['variance', '方差 variance', false],
      ['amplitude_variance', '幅度方差 amplitude_var', false],
      ['cv', '变异系数 cv', false],
      ['source_format', '来源格式 source', false],
      ['updated_at_ms', '更新时间 updated_at_ms', false],
      ['raw_line', '原始日志 raw_line', false],
    ];

    var el = {
      runState: document.getElementById('runState'),
      sampleBadge: document.getElementById('sampleBadge'),
      globalNotice: document.getElementById('globalNotice'),
      serialStatus: document.getElementById('serialStatus'),
      deviceSelect: document.getElementById('deviceSelect'),
      deviceList: document.getElementById('deviceList'),
      latestGrid: document.getElementById('latestGrid'),
      latestStamp: document.getElementById('latestStamp'),
      historyCount: document.getElementById('historyCount'),
      historyLimit: document.getElementById('historyLimit'),
      rawJson: document.getElementById('rawJson'),
      motionCanvas: document.getElementById('motionCanvas'),
      rssiCanvas: document.getElementById('rssiCanvas'),
      amplitudeCanvas: document.getElementById('amplitudeCanvas'),
      motionRange: document.getElementById('motionRange'),
      rssiRange: document.getElementById('rssiRange'),
      amplitudeRange: document.getElementById('amplitudeRange'),
      serialForm: document.getElementById('serialForm'),
      serialPort: document.getElementById('serialPort'),
      serialPortList: document.getElementById('serialPortList'),
      serialBaud: document.getElementById('serialBaud'),
      connectSerial: document.getElementById('connectSerial'),
      stopSerial: document.getElementById('stopSerial'),
      refreshPorts: document.getElementById('refreshPorts'),
      serialHint: document.getElementById('serialHint'),
      serialPorts: document.getElementById('serialPorts'),
      manualLine: document.getElementById('manualLine'),
      parseLine: document.getElementById('parseLine'),
      mockSample: document.getElementById('mockSample'),
      clearHistory: document.getElementById('clearHistory'),
      toast: document.getElementById('toast'),
    };

    function formatValue(value) {
      if (value === undefined || value === null || value === '') {
        return '-';
      }
      if (typeof value === 'number') {
        return Number.isInteger(value) ? String(value) : value.toFixed(4).replace(/0+$/, '').replace(/\.$/, '');
      }
      if (typeof value === 'boolean') {
        return value ? '是' : '否';
      }
      return String(value);
    }

    function occupancyLabel(value) {
      var text = String(value || '').trim().toLowerCase();
      if (text === 'vacant') {
        return '无人';
      }
      if (text === 'occupied') {
        return '有人';
      }
      if (text === 'unknown') {
        return '未知';
      }
      return formatValue(value);
    }

    function motionLabel(value) {
      var text = String(value || '').trim().toLowerCase();
      if (text === 'idle' || text === 'static') {
        return '静止';
      }
      if (text === 'motion' || text === 'moving' || text === 'active') {
        return '运动';
      }
      if (text === 'unknown') {
        return '未知';
      }
      return formatValue(value);
    }

    function sourceFormatLabel(value) {
      var text = String(value || '').trim().toLowerCase();
      if (text === 'csi summary') {
        return 'CSI 摘要';
      }
      if (text === 'csi json') {
        return 'CSI JSON';
      }
      if (text === 'csi_placeholder_gateway') {
        return 'CSI 网关占位';
      }
      return formatValue(value);
    }

    function readField(sample, field) {
      if (!sample) {
        return undefined;
      }
      if (field === 'occupancy') {
        return occupancyLabel(sample.occupancy || sample.state);
      }
      if (field === 'motion_state') {
        return motionLabel(sample.motion_state || sample.motion || '');
      }
      if (field === 'source_format') {
        return sourceFormatLabel(sample.source_format);
      }
      if (field === 'variance') {
        return sample.variance !== undefined ? sample.variance : sample.amplitude_variance;
      }
      if (field === 'amplitude_variance') {
        return sample.amplitude_variance !== undefined ? sample.amplitude_variance : sample.variance;
      }
      if (field === 'packet_count') {
        return sample.packet_count !== undefined ? sample.packet_count : sample.sample_count;
      }
      if (field === 'motion_score') {
        return sample.motion_score !== undefined ? sample.motion_score : sample.presence_score;
      }
      return sample[field];
    }

    async function fetchJson(url, options) {
      var response = await fetch(url, options || {});
      var text = await response.text();
      var data = {};
      if (text) {
        try {
          data = JSON.parse(text);
        } catch (error) {
          throw new Error('服务返回了非 JSON 内容: ' + text.slice(0, 120));
        }
      }
      if (!response.ok || data.ok === false) {
        throw new Error(data.error || ('HTTP ' + response.status));
      }
      return data;
    }

    function localizeMessage(message) {
      var text = String(message || '').trim();
      if (!text) {
        return '';
      }
      var exact = {
        'serial port is required': '请填写串口路径',
        'serial port must match /dev/cu.*': '串口路径必须是 /dev/cu.*',
        'baudRate must be a positive integer': '波特率必须是正整数',
        'line is empty': '日志行不能为空',
        'line did not contain a supported CSI marker': '这一行不包含支持的 CSI 标记',
        'JSON payload must be an object': 'JSON 负载必须是对象',
        'request body must be JSON': '请求体必须是 JSON',
        'Not found': '接口不存在',
      };
      if (exact[text]) {
        return exact[text];
      }
      return text
        .replace('line did not contain JSON or key=value fields', '日志行中没有 JSON 或 key=value 字段')
        .replace('parse error', '解析失败')
        .replace('failed to list serial ports', '读取串口列表失败')
        .replace('failed to open', '打开串口失败')
        .replace('failed to close serial port', '关闭串口失败')
        .replace('serial port error', '串口错误')
        .replace('serial mode unavailable', '串口模式不可用')
        .replace('Missing optional dependency "serialport"; serial APIs are disabled.', '缺少可选依赖 serialport，串口接口已禁用。')
        .replace('Run "npm install" to enable serial port mode.', '运行 npm install 后重启即可启用串口模式。')
        .replace(/^HTTP (\d+)$/, 'HTTP 错误 $1');
    }

    function showToast(message, kind) {
      el.toast.textContent = localizeMessage(message);
      el.toast.className = 'toast visible ' + (kind || '');
      window.clearTimeout(showToast.timer);
      showToast.timer = window.setTimeout(function () {
        el.toast.className = 'toast';
      }, 3400);
    }

    function renderNotice() {
      var message = '';
      if (state.status && state.status.serialport_available === false) {
        message = '未安装 serialport，串口功能不可用，但可使用粘贴日志/模拟样本。运行 npm install 后重启可启用串口。';
      } else if (state.status && (state.status.lastError || state.status.last_error)) {
        message = localizeMessage(state.status.lastError || state.status.last_error);
      }
      el.globalNotice.textContent = message;
      el.globalNotice.classList.toggle('visible', Boolean(message));
    }

    function renderStatus() {
      var connected = Boolean(state.status.connected || state.status.running);
      var serialAvailable = state.status.serialport_available !== false;
      el.runState.classList.toggle('running', connected);
      el.runState.classList.toggle('warn', !connected && !serialAvailable);
      el.runState.querySelector('span:last-child').textContent = connected ? '串口运行中' : serialAvailable ? '未连接串口' : '串口不可用';
      el.sampleBadge.textContent = String(state.totalCount || state.history.length || 0) + ' 个样本';
      el.connectSerial.disabled = !serialAvailable;
      el.stopSerial.disabled = !serialAvailable;

      var rows = [
        ['连接状态', connected ? '已连接' : '未连接'],
        ['串口路径', state.status.port || '-'],
        ['波特率', state.status.baudRate || state.status.baud || '-'],
        ['串口依赖', serialAvailable ? '可用' : '缺失'],
        ['打开时间', state.status.opened_at_iso || '-'],
        ['已读行数', state.status.lines_seen || 0],
        ['样本数', state.status.samples_seen || 0],
        ['最后一行', state.status.last_line || '-'],
        ['最后错误', state.status.lastError || state.status.last_error || '-'],
      ];

      el.serialStatus.innerHTML = rows.map(function (row) {
        return '<div class="kv-row"><div class="kv-key">' + escapeHtml(row[0]) + '</div><div class="kv-value">' + escapeHtml(formatValue(row[1])) + '</div></div>';
      }).join('');
      renderNotice();
    }

    function renderSerialPorts() {
      var ports = state.ports || [];
      var activePort = state.status.port || '';
      var connected = Boolean(state.status.connected || state.status.running);
      var serialAvailable = state.status.serialport_available !== false;

      el.serialPortList.innerHTML = ports.map(function (port) {
        return '<option value="' + escapeAttr(port.path) + '"></option>';
      }).join('');

      if (!serialAvailable) {
        el.serialHint.textContent = '未安装 serialport，串口功能不可用；你仍然可以粘贴日志或生成模拟样本完成验证。';
      } else if (connected) {
        el.serialHint.textContent = '已连接串口 ' + activePort + ' @ ' + formatValue(state.status.baudRate || state.status.baud) + '。';
      } else if (ports.length) {
        el.serialHint.textContent = '请选择一个 /dev/cu.* 串口，或启动前设置 CSI_SERIAL_PORT=/dev/cu.xxx 自动连接。';
      } else {
        el.serialHint.textContent = '未发现 /dev/cu.* 串口；请连接 ESP USB 串口，或使用手动调试区。';
      }

      el.serialPorts.innerHTML = ports.length
        ? ports.map(function (port) {
          var active = port.path === activePort ? ' active' : '';
          var meta = [
            port.manufacturer,
            port.vendorId && port.productId ? 'VID:' + port.vendorId + ' PID:' + port.productId : '',
            port.serialNumber ? 'SN:' + port.serialNumber : '',
            port.unavailable_reason || '',
          ].filter(Boolean).join(' / ');
          return '<button class="port-button' + active + '" type="button" data-port="' + escapeAttr(port.path) + '"><span>' + escapeHtml(port.path) + '</span><span class="port-meta">' + escapeHtml(meta || '串口设备') + '</span></button>';
        }).join('')
        : '<div class="subtle">未发现 /dev/cu.* 串口</div>';
    }

    function renderDevices() {
      var previous = state.selectedDevice;
      if (!state.devices.includes(state.selectedDevice)) {
        state.selectedDevice = state.devices[0] || '';
      }

      el.deviceSelect.innerHTML = state.devices.length
        ? state.devices.map(function (device) {
          return '<option value="' + escapeAttr(device) + '">' + escapeHtml(device) + '</option>';
        }).join('')
        : '<option value="">全部设备</option>';
      el.deviceSelect.value = state.selectedDevice;

      el.deviceList.innerHTML = state.devices.length
        ? state.devices.map(function (device) {
          var sample = state.latest[device] || {};
          var active = device === state.selectedDevice ? ' active' : '';
          return '<button class="device-button' + active + '" type="button" data-device="' + escapeAttr(device) + '"><span>' + escapeHtml(device) + '</span><span>' + escapeHtml(formatValue(readField(sample, 'motion_score'))) + '</span></button>';
        }).join('')
        : '<div class="subtle">暂无设备</div>';

      if (previous !== state.selectedDevice) {
        refreshHistory();
      }
    }

    function selectedSample() {
      if (state.selectedDevice && state.latest[state.selectedDevice]) {
        return state.latest[state.selectedDevice];
      }
      return state.latestSample || null;
    }

    function renderLatest() {
      var sample = selectedSample();
      var hasData = Boolean(sample);
      document.body.classList.toggle('no-data', !hasData);

      el.latestGrid.innerHTML = latestFields.map(function (entry) {
        var field = entry[0];
        var label = entry[1];
        var strong = entry[2];
        var value = sample ? readField(sample, field) : undefined;
        return '<div class="metric ' + (strong ? 'strong' : '') + '"><div class="metric-label">' + escapeHtml(label) + '</div><div class="metric-value">' + escapeHtml(formatValue(value)) + '</div></div>';
      }).join('');
      el.latestStamp.textContent = sample && sample.received_at_iso ? sample.received_at_iso : '';
      el.rawJson.textContent = sample ? JSON.stringify(sample, null, 2) : '{}';
    }

    function renderCharts() {
      el.historyCount.textContent = String(state.history.length) + ' / ' + String(state.historyLimit) + ' 个样本';
      var rootStyle = getComputedStyle(document.documentElement);
      drawSeries(el.motionCanvas, state.history.map(function (sample) { return numeric(readField(sample, 'motion_score')); }), rootStyle.getPropertyValue('--accent').trim(), el.motionRange, '暂无 motion_score');
      drawSeries(el.rssiCanvas, state.history.map(function (sample) { return numeric(sample.rssi); }), rootStyle.getPropertyValue('--accent-3').trim(), el.rssiRange, '暂无 rssi');
      drawSeries(el.amplitudeCanvas, state.history.map(function (sample) {
        return numeric(sample.amplitude !== undefined ? sample.amplitude : (sample.amplitude_variance !== undefined ? sample.amplitude_variance : sample.variance));
      }), rootStyle.getPropertyValue('--accent-2').trim(), el.amplitudeRange, '暂无幅度或方差');
    }

	    function numeric(value) {
	      var number = Number(value);
	      return Number.isFinite(number) ? number : null;
	    }

	    function clampRefreshInterval(value) {
	      var number = Number(value);
	      if (!Number.isFinite(number)) {
	        return REFRESH_INTERVAL_DEFAULT_MS;
	      }
	      return Math.max(REFRESH_INTERVAL_MIN_MS, Math.min(REFRESH_INTERVAL_MAX_MS, Math.round(number)));
	    }

	    function median(values) {
	      if (!values.length) {
	        return null;
	      }
	      var sorted = values.slice().sort(function (a, b) { return a - b; });
	      var middle = Math.floor(sorted.length / 2);
	      if (sorted.length % 2) {
	        return sorted[middle];
	      }
	      return (sorted[middle - 1] + sorted[middle]) / 2;
	    }

	    function estimateRefreshIntervalMs() {
	      var samples = state.history.slice(-REFRESH_INTERVAL_HISTORY_SIZE);
	      var timestamps = samples.map(function (sample) {
	        return numeric(sample.server_time_ms || sample.received_at_ms || sample.updated_at_ms);
	      }).filter(function (value) {
	        return value !== null;
	      });
	      var deltas = [];
	      for (var i = 1; i < timestamps.length; i += 1) {
	        var delta = timestamps[i] - timestamps[i - 1];
	        if (delta > 0 && delta <= REFRESH_INTERVAL_MAX_MS * 4) {
	          deltas.push(delta);
	        }
	      }
	      return clampRefreshInterval(median(deltas) || REFRESH_INTERVAL_DEFAULT_MS);
	    }

	    function scheduleNextRefresh() {
	      window.clearTimeout(state.refreshTimer);
	      state.refreshIntervalMs = estimateRefreshIntervalMs();
	      state.refreshTimer = window.setTimeout(refreshDataLoop, state.refreshIntervalMs);
	    }

	    function scheduleStatusRefresh() {
	      window.clearTimeout(state.statusRefreshTimer);
	      state.statusRefreshTimer = window.setTimeout(refreshStatusLoop, SERIAL_STATUS_REFRESH_INTERVAL_MS);
	    }

	    function schedulePortsRefresh() {
	      window.clearTimeout(state.portsRefreshTimer);
	      state.portsRefreshTimer = window.setTimeout(refreshPortsLoop, SERIAL_PORTS_REFRESH_INTERVAL_MS);
	    }

    function drawSeries(canvas, values, color, rangeTarget, emptyText) {
      var ctx = canvas.getContext('2d');
      var width = canvas.width;
      var height = canvas.height;
      ctx.clearRect(0, 0, width, height);
      ctx.fillStyle = '#0b0e12';
      ctx.fillRect(0, 0, width, height);

      var padding = 28;
      var usableWidth = width - padding * 2;
      var usableHeight = height - padding * 2;
      var points = values.map(function (value, index) {
        return { value: value, index: index };
      }).filter(function (point) {
        return point.value !== null;
      });

      drawGrid(ctx, padding, width, height);

      if (points.length === 0) {
        ctx.fillStyle = '#98a6b3';
        ctx.font = '14px ui-monospace, Menlo, monospace';
        ctx.fillText(emptyText || '等待数据', padding, height / 2);
        rangeTarget.textContent = '';
        return;
      }

      var min = Math.min.apply(null, points.map(function (point) { return point.value; }));
      var max = Math.max.apply(null, points.map(function (point) { return point.value; }));
      if (min === max) {
        min -= 1;
        max += 1;
      }
      rangeTarget.textContent = formatValue(min) + ' .. ' + formatValue(max);

      var displayPoints = smoothDisplayPoints(decimateDisplayPoints(points, CHART_MAX_DISPLAY_POINTS));
      var chartPoints = displayPoints.map(function (point) {
        return {
          x: padding + (values.length <= 1 ? usableWidth : (point.index / (values.length - 1)) * usableWidth),
          y: padding + (1 - (point.value - min) / (max - min)) * usableHeight
        };
      });

      ctx.strokeStyle = colorWithAlpha(color, 0.18);
      ctx.lineWidth = 6;
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';
      ctx.beginPath();
      drawSmoothPath(ctx, chartPoints);
      ctx.stroke();

      ctx.strokeStyle = color;
      ctx.lineWidth = 2.2;
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';
      ctx.beginPath();
      drawSmoothPath(ctx, chartPoints);
      ctx.stroke();

      ctx.fillStyle = color;
      chartPoints.forEach(function (point) {
        ctx.beginPath();
        ctx.arc(point.x, point.y, 2.4, 0, Math.PI * 2);
        ctx.fill();
      });
    }

    function decimateDisplayPoints(points, maxPoints) {
      if (points.length <= maxPoints) {
        return points;
      }

      var bucketSize = Math.ceil(points.length / maxPoints);
      var displayPoints = [points[0]];
      for (var start = 1; start < points.length - 1; start += bucketSize) {
        var end = Math.min(points.length - 1, start + bucketSize);
        var minPoint = points[start];
        var maxPoint = points[start];
        for (var i = start + 1; i < end; i += 1) {
          if (points[i].value < minPoint.value) {
            minPoint = points[i];
          }
          if (points[i].value > maxPoint.value) {
            maxPoint = points[i];
          }
        }
        if (minPoint.index < maxPoint.index) {
          displayPoints.push(minPoint, maxPoint);
        } else if (maxPoint.index < minPoint.index) {
          displayPoints.push(maxPoint, minPoint);
        } else {
          displayPoints.push(minPoint);
        }
      }
      displayPoints.push(points[points.length - 1]);
      return displayPoints;
    }

    function smoothDisplayPoints(points) {
      if (points.length < 4) {
        return points;
      }

      var smoothed = points.map(function (point, index) {
        var previous = points[Math.max(0, index - 1)];
        var next = points[Math.min(points.length - 1, index + 1)];
        return {
          index: point.index,
          value: previous.value * 0.2 + point.value * 0.6 + next.value * 0.2
        };
      });

      smoothed[0].value = points[0].value;
      smoothed[smoothed.length - 1].value = points[points.length - 1].value;
      return smoothed;
    }

    function drawSmoothPath(ctx, points) {
      if (points.length === 0) {
        return;
      }
      ctx.moveTo(points[0].x, points[0].y);
      if (points.length === 1) {
        return;
      }
      if (points.length === 2) {
        ctx.lineTo(points[1].x, points[1].y);
        return;
      }

      for (var i = 0; i < points.length - 1; i += 1) {
        var previous = points[Math.max(0, i - 1)];
        var current = points[i];
        var next = points[i + 1];
        var following = points[Math.min(points.length - 1, i + 2)];
        var cp1x = current.x + (next.x - previous.x) / 8;
        var cp1y = current.y + (next.y - previous.y) / 8;
        var cp2x = next.x - (following.x - current.x) / 8;
        var cp2y = next.y - (following.y - current.y) / 8;
        ctx.bezierCurveTo(cp1x, cp1y, cp2x, cp2y, next.x, next.y);
      }
    }

    function colorWithAlpha(color, alpha) {
      var text = String(color || '').trim();
      if (text.charAt(0) !== '#' || (text.length !== 4 && text.length !== 7)) {
        return text;
      }
      var r;
      var g;
      var b;
      if (text.length === 4) {
        r = Number.parseInt(text.charAt(1) + text.charAt(1), 16);
        g = Number.parseInt(text.charAt(2) + text.charAt(2), 16);
        b = Number.parseInt(text.charAt(3) + text.charAt(3), 16);
      } else {
        r = Number.parseInt(text.slice(1, 3), 16);
        g = Number.parseInt(text.slice(3, 5), 16);
        b = Number.parseInt(text.slice(5, 7), 16);
      }
      if (![r, g, b].every(Number.isFinite)) {
        return text;
      }
      return 'rgba(' + r + ', ' + g + ', ' + b + ', ' + alpha + ')';
    }

    function drawGrid(ctx, padding, width, height) {
      ctx.strokeStyle = 'rgba(255,255,255,0.09)';
      ctx.lineWidth = 1;
      for (var i = 0; i <= 4; i += 1) {
        var y = padding + ((height - padding * 2) / 4) * i;
        ctx.beginPath();
        ctx.moveTo(padding, y);
        ctx.lineTo(width - padding, y);
        ctx.stroke();
      }
      for (var j = 0; j <= 6; j += 1) {
        var x = padding + ((width - padding * 2) / 6) * j;
        ctx.beginPath();
        ctx.moveTo(x, padding);
        ctx.lineTo(x, height - padding);
        ctx.stroke();
      }
    }

    async function refreshLatest() {
      var data = await fetchJson('/api/csi/latest');
      state.latest = data.latest || {};
      state.devices = data.devices || Object.keys(state.latest).sort();
      state.latestSample = data.latest_sample || data.sample || null;
      state.totalCount = data.count || 0;
      renderDevices();
      renderLatest();
      renderStatus();
    }

    async function refreshHistory() {
      var params = new URLSearchParams({ limit: String(state.historyLimit) });
      if (state.selectedDevice) {
        params.set('device_id', state.selectedDevice);
      }
      var data = await fetchJson('/api/csi/history?' + params.toString());
      state.history = data.history || [];
      state.totalCount = data.count || state.totalCount || 0;
      renderCharts();
      renderStatus();
    }

    async function refreshStatus() {
      state.status = await fetchJson('/api/serial/status');
      renderStatus();
      renderSerialPorts();
    }

    async function refreshPorts() {
      var data = await fetchJson('/api/serial/ports');
      state.ports = data.ports || [];
      if (data.status) {
        state.status = data.status;
        renderStatus();
      }
      renderSerialPorts();
    }

	    async function refreshAll() {
	      if (state.refreshInFlight) {
	        return;
	      }
	      state.refreshInFlight = true;
      try {
        await Promise.all([refreshLatest(), refreshHistory(), refreshStatus(), refreshPorts()]);
      } catch (error) {
        state.status = Object.assign({}, state.status, { lastError: error.message });
        renderStatus();
        renderSerialPorts();
		      } finally {
		        state.refreshInFlight = false;
		        scheduleNextRefresh();
		        scheduleStatusRefresh();
		        schedulePortsRefresh();
		      }
		    }

	    async function refreshDataLoop() {
	      if (state.refreshInFlight) {
	        scheduleNextRefresh();
	        return;
	      }
	      state.refreshInFlight = true;
	      try {
	        await Promise.all([refreshLatest(), refreshHistory()]);
	      } catch (error) {
	        state.status = Object.assign({}, state.status, { lastError: error.message });
	        renderStatus();
	      } finally {
	        state.refreshInFlight = false;
	        scheduleNextRefresh();
	      }
	    }

	    async function refreshStatusLoop() {
	      if (state.statusRefreshInFlight) {
	        scheduleStatusRefresh();
	        return;
	      }
	      state.statusRefreshInFlight = true;
	      try {
	        await refreshStatus();
	      } catch (error) {
	        state.status = Object.assign({}, state.status, { lastError: error.message });
	        renderStatus();
	      } finally {
	        state.statusRefreshInFlight = false;
	        scheduleStatusRefresh();
	      }
	    }

	    async function refreshPortsLoop() {
	      if (state.portsRefreshInFlight) {
	        schedulePortsRefresh();
	        return;
	      }
	      state.portsRefreshInFlight = true;
	      try {
	        await refreshPorts();
	      } catch (error) {
	        state.status = Object.assign({}, state.status, { lastError: error.message });
	        renderStatus();
	        renderSerialPorts();
	      } finally {
	        state.portsRefreshInFlight = false;
	        schedulePortsRefresh();
	      }
	    }

    async function refreshDataOnly() {
      try {
        await refreshLatest();
        await refreshHistory();
      } catch (error) {
        showToast(error.message, 'error');
      }
    }

    el.deviceSelect.addEventListener('change', function () {
      state.selectedDevice = el.deviceSelect.value;
      renderDevices();
      renderLatest();
      refreshHistory();
    });

    el.deviceList.addEventListener('click', function (event) {
      var button = event.target.closest('[data-device]');
      if (!button) {
        return;
      }
      state.selectedDevice = button.dataset.device;
      renderDevices();
      renderLatest();
      refreshHistory();
    });

    el.serialPorts.addEventListener('click', function (event) {
      var button = event.target.closest('[data-port]');
      if (!button) {
        return;
      }
      el.serialPort.value = button.dataset.port;
    });

    el.refreshPorts.addEventListener('click', function () {
      refreshPorts().then(function () {
        showToast('端口列表已刷新', 'ok');
      }).catch(function (error) {
        showToast(error.message, 'error');
      });
    });

    el.serialForm.addEventListener('submit', async function (event) {
      event.preventDefault();
      var body = {
        port: el.serialPort.value.trim(),
        baudRate: Number.parseInt(el.serialBaud.value, 10) || 115200,
      };
      try {
        await fetchJson('/api/serial/connect', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        });
        showToast('串口已连接', 'ok');
      } catch (error) {
        state.status = Object.assign({}, state.status, { lastError: error.message });
        showToast(error.message, 'error');
      }
      refreshStatus();
    });

    el.stopSerial.addEventListener('click', async function () {
      try {
        await fetchJson('/api/serial/disconnect', { method: 'POST' });
        showToast('串口已断开', 'ok');
      } catch (error) {
        state.status = Object.assign({}, state.status, { lastError: error.message });
        showToast(error.message, 'error');
      }
      refreshStatus();
    });

    el.parseLine.addEventListener('click', async function () {
      try {
        await fetchJson('/api/csi/log-line', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ line: el.manualLine.value.trim() }),
        });
        showToast('日志行已解析并写入历史', 'ok');
        refreshDataOnly();
      } catch (error) {
        showToast(error.message, 'error');
        refreshStatus();
      }
    });

    el.mockSample.addEventListener('click', async function () {
      try {
        await fetchJson('/api/csi/mock', { method: 'POST' });
        showToast('已生成模拟样本', 'ok');
        refreshDataOnly();
      } catch (error) {
        showToast(error.message, 'error');
      }
    });

    el.historyLimit.addEventListener('change', function () {
      state.historyLimit = Number.parseInt(el.historyLimit.value, 10) || HISTORY_LIMIT_DEFAULT;
      refreshHistory();
    });

    el.clearHistory.addEventListener('click', async function () {
      try {
        await fetchJson('/api/csi/history', { method: 'DELETE' });
        state.latest = {};
        state.devices = [];
        state.selectedDevice = '';
        state.latestSample = null;
        state.history = [];
        state.totalCount = 0;
        renderDevices();
        renderLatest();
        renderCharts();
        renderStatus();
        showToast('历史已清空', 'ok');
      } catch (error) {
        showToast(error.message, 'error');
      }
    });

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function escapeAttr(value) {
      return escapeHtml(value);
    }

	    refreshAll();
	  </script>
</body>
